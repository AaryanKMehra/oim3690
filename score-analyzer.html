<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Score Analyzer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 40px; background-color: #f0f2f5; }
        .dashboard { max-width: 600px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-box { background: #eef2ff; padding: 15px; border-radius: 8px; border-left: 5px solid #4f46e5; }
        .stat-box h4 { margin: 0; color: #4f46e5; font-size: 0.9rem; }
        .stat-box p { margin: 5px 0 0; font-size: 1.4rem; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #ddd; }
        th { background-color: #f8fafc; }
        .pass { color: green; font-weight: bold; }
        .fail { color: red; font-weight: bold; }
    </style>
</head>
<body>

    <div class="dashboard">
        <h1>Score Analyzer</h1>
        
        <div class="stats-grid">
            <div class="stat-box">
                <h4>Total Scores</h4>
                <p id="totalCount">0</p>
            </div>
            <div class="stat-box">
                <h4>Average Score</h4>
                <p id="avgScore">0</p>
            </div>
            <div class="stat-box">
                <h4>High / Low</h4>
                <p id="highLow">0 / 0</p>
            </div>
            <div class="stat-box">
                <h4>Passing (60+)</h4>
                <p id="passCount">0</p>
            </div>
        </div>

        <h3>Detailed Breakdown</h3>
        <table>
            <thead>
                <tr>
                    <th>Score</th>
                    <th>Grade</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="scoreTableBody"></tbody>
        </table>
    </div>

    <script>
        // 1. DATA
        const scores = [88, 72, 95, 63, 81, 56, 90];

        // 2. LOGIC (S18 Skills)
        function getGrade(score) {
            if (score >= 90) return 'A';
            if (score >= 80) return 'B';
            if (score >= 70) return 'C';
            if (score >= 60) return 'D';
            return 'F';
        }

        // 3. PROCESSING & DISPLAY
        function analyzeScores() {
            let sum = 0;
            let passingCount = 0;
            let high = scores[0];
            let low = scores[0];
            
            const tableBody = document.getElementById('scoreTableBody');
            tableBody.innerHTML = ''; // Clear table

            // The Loop
            for (let i = 0; i < scores.length; i++) {
                let currentScore = scores[i];
                sum += currentScore;

                // Check High/Low
                if (currentScore > high) high = currentScore;
                if (currentScore < low) low = currentScore;

                // Check Passing
                if (currentScore >= 60) passingCount++;

                // Build Table Row
                const statusClass = currentScore >= 60 ? 'pass' : 'fail';
                const row = `<tr>
                    <td>${currentScore}</td>
                    <td>${getGrade(currentScore)}</td>
                    <td class="${statusClass}">${currentScore >= 60 ? 'PASS' : 'FAIL'}</td>
                </tr>`;
                tableBody.innerHTML += row;
            }

            // Calculate Average
            const average = (sum / scores.length).toFixed(1);

            // Update Summary Stats
            document.getElementById('totalCount').textContent = scores.length;
            document.getElementById('avgScore').textContent = average;
            document.getElementById('highLow').textContent = `${high} / ${low}`;
            document.getElementById('passCount').textContent = passingCount;
        }

        // Run analysis on load
        analyzeScores();
    </script>
</body>
</html>
