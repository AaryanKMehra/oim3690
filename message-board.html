<!DOCTYPE html>
<html>
<body>

  <h1>Class Message Board</h1>

  <input type="text" id="newMessage" placeholder="Type your message...">
  <button onclick="sendNewMessage()">Post Message</button>
  
  <p id="status"></p>

  <hr>

  <h2>All Messages</h2>
  <div id="messageList">Loading messages...</div>

  <script>
    // 1. Function to fetch and display all messages
    async function loadMessages() {
      const listContainer = document.getElementById('messageList');
      
      try {
        const response = await fetch('https://oim.108122.xyz/messages');
        const data = await response.json();
        
        // Some APIs wrap lists in a 'data' property, others just return the list directly. 
        // This handles both just in case!
        const messagesArray = data.data || data; 

        // Build the HTML list
        let htmlList = "<ul>";
        for (const msg of messagesArray) {
          // Assuming the API returns objects with a 'message' field
          // If it's structured differently, it will print the raw JSON so you can see it
          const textToDisplay = msg.message || JSON.stringify(msg);
          htmlList += `<li>${textToDisplay}</li>`;
        }
        htmlList += "</ul>";
        
        listContainer.innerHTML = htmlList;
        
      } catch (error) {
        listContainer.innerHTML = "<p>Error loading messages.</p>";
      }
    }

    // 2. Function to post a new message to the server
    async function sendNewMessage() {
      const text = document.getElementById('newMessage').value;
      const statusText = document.getElementById('status');
      
      statusText.innerText = "Sending...";

      try {
        const response = await fetch('https://oim.108122.xyz/message', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Token': 'aaryanaaryan' 
          },
          body: JSON.stringify({ message: text })
        });
        
        if (response.ok) {
            statusText.innerText = "Message posted successfully!";
            document.getElementById('newMessage').value = ''; // Clear the input box
            
            // 3. REFRESH THE LIST: Call the load function again to get the updated board!
            loadMessages();
        } else {
            statusText.innerText = "Failed to post message.";
        }
        
      } catch (error) {
        statusText.innerText = "Error: Could not connect to server.";
      }
    }

    // 4. Run the load function immediately when the page first opens
    loadMessages();
  </script>

</body>
</html>
