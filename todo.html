<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Playful animated gradient background */
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #333;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #vfx-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 9999;
        }

        .core-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 40px;
            border-radius: 24px; /* Rounded edges */
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 550px;
            z-index: 10;
            position: relative;
        }

        .header-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 15px;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            color: #444;
            letter-spacing: 1px;
        }

        .status-text {
            font-size: 13px;
            color: #888;
            font-weight: 600;
            background: #f0f4f8;
            padding: 6px 12px;
            border-radius: 20px;
        }

        .progress-track {
            height: 8px;
            background: #eef2f5;
            width: 100%;
            margin-bottom: 30px;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #a1c4fd, #c2e9fb);
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 10px;
        }

        .command-line {
            display: flex;
            gap: 12px;
            margin-bottom: 35px;
        }

        input[type="text"] {
            flex: 1;
            padding: 14px 18px;
            background: #fff;
            border: 2px solid #eef2f5;
            border-radius: 14px;
            font-size: 15px;
            color: #333;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: #a1c4fd;
            box-shadow: 0 0 0 3px rgba(161, 196, 253, 0.2);
        }

        input[type="text"]::placeholder {
            color: #aaa;
        }

        select {
            padding: 14px;
            background: #fff;
            color: #555;
            border: 2px solid #eef2f5;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            outline: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        select:focus {
            border-color: #a1c4fd;
        }

        button.action-btn {
            padding: 14px 24px;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            color: #fff;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(161, 196, 253, 0.4);
        }

        button.action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(161, 196, 253, 0.6);
        }

        button.action-btn:active {
            transform: scale(0.96);
        }

        ul {
            list-style-type: none;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
        }

        ul::-webkit-scrollbar {
            width: 6px;
        }
        ul::-webkit-scrollbar-track {
            background: transparent;
        }
        ul::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 10px;
        }

        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: #fff;
            margin-bottom: 12px;
            border-radius: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            border: 1px solid #f0f0f0;
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transition: all 0.3s ease;
        }

        li:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
        }

        li.striking {
            text-decoration: line-through;
            color: #aaa;
            background: #fafafa;
            pointer-events: none;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .task-data {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
            font-weight: 500;
        }

        .tag {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 5px 10px;
            border-radius: 8px;
            font-weight: 700;
        }

        /* Updated colorful tags */
        .tag-High { background: #ffe2e5; color: #ff5c77; }
        .tag-Medium { background: #fff4d2; color: #f2a900; }
        .tag-Low { background: #e3f9e5; color: #28a745; }

        .destroy-btn {
            background: #fff0f0;
            color: #ff5c77;
            border: none;
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .destroy-btn:hover {
            background: #ff5c77;
            color: #fff;
        }
    </style>
</head>
<body>

<canvas id="vfx-canvas"></canvas>

<div class="core-container">
    <div class="header-box">
        <h1>My Tasks</h1>
        <div class="status-text"><span id="activeCount">0</span> Active</div>
    </div>
    
    <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="command-line">
        <input type="text" id="taskInput" placeholder="What needs to be done?">
        <select id="prioritySelect">
            <option value="High">High</option>
            <option value="Medium">Med</option>
            <option value="Low">Low</option>
        </select>
        <button class="action-btn" id="addBtn">Add</button>
    </div>
    <ul id="taskList"></ul>
</div>

<script>
    const taskInput = document.getElementById('taskInput');
    const prioritySelect = document.getElementById('prioritySelect');
    const addBtn = document.getElementById('addBtn');
    const taskList = document.getElementById('taskList');
    const activeCountDisplay = document.getElementById('activeCount');
    const progressFill = document.getElementById('progressFill');
    const canvas = document.getElementById('vfx-canvas');
    const ctx = canvas.getContext('2d');

    let totalTasksEver = 0;
    let currentTasks = 0;
    let particles = [];

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function updateHud() {
        activeCountDisplay.textContent = currentTasks;
        if (totalTasksEver === 0) {
            progressFill.style.width = '0%';
        } else {
            const completed = totalTasksEver - currentTasks;
            const percentage = (completed / totalTasksEver) * 100;
            progressFill.style.width = percentage + '%';
        }
    }

    class Particle {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 6 + 2;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            this.size = Math.random() * 5 + 2;
            this.life = 1.0;
            this.decay = Math.random() * 0.02 + 0.01;
            
            // Playful confetti colors
            const colors = ['#ff9a9e', '#fecfef', '#a1c4fd', '#c2e9fb', '#f6d365', '#fda085'];
            this.color = colors[Math.floor(Math.random() * colors.length)];
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.vy += 0.1; // Add slight gravity for confetti effect
            this.life -= this.decay;
        }
        draw(ctx) {
            ctx.globalAlpha = Math.max(0, this.life);
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].update();
            particles[i].draw(ctx);
            if (particles[i].life <= 0) {
                particles.splice(i, 1);
            }
        }
        ctx.globalAlpha = 1.0;
        requestAnimationFrame(animateParticles);
    }
    animateParticles();

    function triggerExplosion(x, y, width) {
        for (let i = 0; i < 50; i++) {
            const spawnX = x + (Math.random() * width - width/2);
            particles.push(new Particle(spawnX, y));
        }
    }

    function addTask() {
        const text = taskInput.value.trim();
        const priorityFull = prioritySelect.options[prioritySelect.selectedIndex].text;
        const priorityVal = prioritySelect.value;
        
        if (text === '') return;

        totalTasksEver++;
        currentTasks++;
        updateHud();

        const li = document.createElement('li');
        
        const taskData = document.createElement('div');
        taskData.className = 'task-data';

        const badge = document.createElement('span');
        badge.textContent = priorityFull;
        badge.className = 'tag tag-' + priorityVal;

        const span = document.createElement('span');
        span.textContent = text;
        
        taskData.appendChild(badge);
        taskData.appendChild(span);
        
        const destroyBtn = document.createElement('button');
        destroyBtn.textContent = 'Done';
        destroyBtn.className = 'destroy-btn';
        
        destroyBtn.onclick = function(e) {
            const rect = li.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            li.classList.add('striking');
            
            setTimeout(() => {
                triggerExplosion(centerX, centerY, rect.width);
                li.style.opacity = '0';
                li.style.transform = 'scale(0.9)';
                setTimeout(() => {
                    taskList.removeChild(li);
                    currentTasks--;
                    updateHud();
                }, 200);
            }, 300);
        };

        li.appendChild(taskData);
        li.appendChild(destroyBtn);
        taskList.prepend(li); 

        // Email functionality removed as requested.

        taskInput.value = '';
        taskInput.focus();
    }

    addBtn.addEventListener('click', addTask);
    taskInput.addEventListener('keypress', function(event) {
        if (event.key === 'Enter') addTask();
    });
</script>

</body>
</html>
