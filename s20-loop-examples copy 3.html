<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Input Rating</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f4f4f5; 
    }

    .rating-card {
      background: #ffffff;
      padding: 40px 48px;
      border-radius: 16px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      text-align: center;
      width: 100%;
      max-width: 320px;
    }

    .rating-card h2 {
      margin: 0 0 8px 0;
      color: #18181b;
      font-size: 1.5rem;
      font-weight: 700;
    }

    .rating-card p {
      margin: 0 0 24px 0;
      color: #71717a;
      font-size: 0.95rem;
    }

    /* Styling for the new input and button */
    .input-group {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    input[type="number"] {
      width: 60px;
      padding: 10px;
      border: 1px solid #d4d4d8;
      border-radius: 8px;
      font-size: 1rem;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="number"]:focus {
      border-color: #eab308; /* Highlights gold on focus */
    }

    button {
      background-color: #18181b; /* Dark button */
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #3f3f46;
    }

    /* Reverting back to the simple string styling */
    .star-container {
      font-size: 3.5rem;
      color: #eab308; /* Solid gold */
      letter-spacing: 4px;
      line-height: 1;
      text-shadow: 0 2px 10px rgba(234, 179, 8, 0.2);
      min-height: 56px; /* Prevents jumping before stars load */
    }

    .error-text {
      margin-top: 16px;
      height: 20px;
      color: #ef4444; /* Error red */
      font-size: 0.85rem;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <div class="rating-card">
    <h2>Vehicle Rating</h2>
    <p>Enter a rating from 0 to 5</p>
    
    <div class="input-group">
      <input type="number" id="ratingInput" min="0" max="5" placeholder="0">
      <button id="submitBtn">Submit</button>
    </div>

    <div id="stars" class="star-container">☆☆☆☆☆</div>
    
    <div id="errorMsg" class="error-text"></div>
  </div>

  <script>
    const input = document.querySelector('#ratingInput');
    const button = document.querySelector('#submitBtn');
    const container = document.querySelector('#stars');
    const errorMsg = document.querySelector('#errorMsg');

    button.addEventListener('click', () => {
      // 1. Get the value and convert it to a number
      const rating = parseInt(input.value, 10);

      // 2. Validate the input to ensure it's between 0 and 5
      if (isNaN(rating) || rating < 0 || rating > 5) {
        errorMsg.textContent = "Please enter a valid number between 0 and 5.";
        return; // Stop running the code if invalid
      }

      // 3. Clear any previous errors
      errorMsg.textContent = "";

      // 4. Generate the stars (using the exact logic from your original slide)
      let stars = '';
      for (let i = 0; i < 5; i++) {
        if (i < rating) {
          stars += '★';
        } else {
          stars += '☆';
        }
      }

      // 5. Display the stars
      container.textContent = stars;
    });
  </script>

</body>
</html>
