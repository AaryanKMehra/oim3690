<!DOCTYPE html>
<html>
<body>

  <h1>MA Town Explorer</h1>

  <label for="searchInput">Search:</label>
  <input type="text" id="searchInput" placeholder="Type a town name..." oninput="handleSearch()">
  
  <p id="matchCount">Loading data...</p>

  <p id="bonusDisplay"></p>

  <ul id="townList"></ul>

  <script>
    // Create a global variable to store the full list of towns
    let allTowns = []; 

    // 1. Fetch the data when the page loads
    async function loadData() {
      try {
        const response = await fetch('https://oim.108122.xyz/mass');
        const data = await response.json();
        
        // Save the array of towns to our global variable
        allTowns = data.data;

        // Display just the first 10 towns initially
        displayTowns(allTowns.slice(0, 10));

        // BONUS: Find the town with the largest population
        findLargestTown();

      } catch (error) {
        document.getElementById('matchCount').innerText = "Error: Could not load data.";
      }
    }

    // 2. A reusable function to draw the list on the screen
    function displayTowns(townArray) {
      const listContainer = document.getElementById('townList');
      const countContainer = document.getElementById('matchCount');
      
      // Clear out the old list
      listContainer.innerHTML = '';
      
      // Show how many towns are currently in our array
      countContainer.innerText = `Matches found: ${townArray.length}`;

      // Loop through the array and add each one to the HTML list
      for (const town of townArray) {
        listContainer.innerHTML += `<li>${town.name} (${town.county} County) - Pop: ${town.population}</li>`;
      }
    }

    // 3. The function that runs every time you type in the search box
    function handleSearch() {
      // Get what the user typed and make it lowercase so the search isn't case-sensitive
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      
      // Filter the main list: keep the town if its name includes the search term
      const filteredTowns = allTowns.filter(function(town) {
        return town.name.toLowerCase().includes(searchTerm);
      });
      
      // Send the new filtered list to be displayed
      displayTowns(filteredTowns);
    }

    // 4. Bonus function to find the max population
    function findLargestTown() {
      // Start by assuming the first town is the largest
      let largest = allTowns[0];
      
      // Check every other town to see if it's bigger
      for (const town of allTowns) {
        if (town.population > largest.population) {
          largest = town; // If it is, this becomes our new largest
        }
      }
      
      // Display the winner
      document.getElementById('bonusDisplay').innerHTML = `<strong>Bonus (Largest Town):</strong> ${largest.name} with ${largest.population} people!`;
    }

    // Trigger the initial data fetch as soon as the browser reads this script
    loadData();
  </script>

</body>
</html>
